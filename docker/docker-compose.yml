services:
  postgres:
    image: postgres:16-alpine
    container_name: novyl-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    env_file:
      - ../.env
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ../db/db.sql:/docker-entrypoint-initdb.d/db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novyl-network

  minio:
    image: minio/minio
    container_name: novyl-minio
    restart: unless-stopped
    ports:
      - "9000:9000"
      - "9001:9001"
    env_file:
      - ../.env
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - novyl-network

volumes:
  postgres-data:
  minio-data:

networks:
  novyl-network:
    driver: bridge
